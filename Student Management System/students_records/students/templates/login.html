<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Student Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
       background-image: url(https://static.vecteezy.com/system/resources/previews/001/225/154/non_2x/black-low-poly-geometric-background-vector.jpg)
    }

    nav {
      background-color: #0d47a1;
      padding: 10px;
    }

    .navbar {
      list-style: none;
      display: flex;
      justify-content: flex-end;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin-left: 20px;
    }

    .navbar a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .navbar a.active {
      border-bottom: 2px solid #fff;
    }

    .login-section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 85vh;
    }

    .login-box {
      background-color: #1e1e1e;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      width: 350px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #42a5f5;
    }

    .login-box label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      background-color: #2e2e2e;
      border: none;
      border-radius: 5px;
      color: white;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background-color: #0d47a1;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #1565c0;
    }

    .login-box p {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #0d47a1;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul class="navbar">
        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Login</a></li>
        <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a></li>
        <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
      </ul>
    </nav>
  </header>

  <section class="login-section">
    <div class="login-box">
      <h2>Login</h2>
      <form method="post">
        {% csrf_token %}
        <label for="username">Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>

        <p>Don't have an account? <a href="#" style="color:#42a5f5;">Register</a></p>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Student Management System. All rights reserved.</p>
  </footer>
  {% if error == "no" %}
  <script>
    alert("login Successfull");
    window.location = "{% url 'admin_dashboard' %}";



  </script>
  {% endif %}
</body>
</html>
