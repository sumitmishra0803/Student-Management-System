<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            margin: 0;
        }

        .nav-base {
            background-color: rgb(172, 227, 249);
            text-align: right;
            padding: 5px 20px;
        }

        .home-menu li {
            display: inline;
        }

        .home-menu li a {

            text-decoration: none;
            color: black;
            border: 1px solid black;
            padding: 4px 15px;
            font-size: 25px;
            margin: 0 10px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans';
            transition: all .4s;
        }

        .home-menu li a:hover {
            background-color: rgb(47, 189, 245);
            box-shadow: 0 0 5px 5px rgb(114, 128, 133);
        }
    </style>
</head>

<body>
    <div class="nav-base">
        <ul class="home-menu">
            <li><a href="{% url 'index' %}"><i class="fa-solid fa-house-user fa-lg"></i>Home</a></li>
            <li><a href="{% url 'login' %}"><i class="fa-solid fa-arrow-right-to-bracket fa-lg"></i>Login</a></li>
            <li><a href="{% url 'contactus' %}"><i class="fa-solid fa-address-card fa-lg"></i>Contact us</a></li>
            <li><a href="{% url 'about' %}"><i class="fa-solid fa-circle-info fa-lg"></i>About</a></li>


        </ul>


    </div>

</body>

</html>
