<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Student Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      background-image: url(https://static.vecteezy.com/system/resources/previews/001/225/154/non_2x/black-low-poly-geometric-background-vector.jpg);
    }

    nav {
      background-color: #0d47a1;
      padding: 10px;
    }

    .navbar {
      list-style: none;
      display: flex;
      justify-content: flex-end;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin-left: 20px;
    }

    .navbar a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .navbar a.active {
      border-bottom: 2px solid #fff;
    }

    .contact-section {
      padding: 40px;
      text-align: center;
    }

    .contact-section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .contact-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    .contact-form,
    .contact-info {
      flex: 1 1 300px;
      background-color: #1e1e1e;
      padding: 30px;
      border-radius: 8px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border: none;
      border-radius: 5px;
      background-color: #2e2e2e;
      color: white;
    }

    .contact-form button {
      background-color: #0d47a1;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .contact-form button:hover {
      background-color: #1565c0;
    }

    .contact-info h3 {
      margin-bottom: 15px;
      color: #ffffff;
    }

    .contact-info p {
      margin: 10px 0;
      font-size: 16px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #0d47a1;
      color: #fff;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul class="navbar">
        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
        <li><a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact Us</a></li>
        <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact-section">
    <h2>Contact Us</h2>
    <div class="contact-container">
      <form class="contact-form">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Your Message</label>
        <textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Reach Us</h3>
        <p><i class="fas fa-map-marker-alt"></i> City College Campus, India</p>
        <p><i class="fas fa-phone"></i> +91 98765 43210</p>
        <p><i class="fas fa-envelope"></i> studentmgmt@example.com</p>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Student Management System. All rights reserved.</p>
  </footer>
</body>
</html>
