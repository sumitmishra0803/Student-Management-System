<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Student - Student Records</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f6fc;
      margin: 0;
      padding: 0;
      background-image: url(https://static.vecteezy.com/system/resources/previews/001/225/154/non_2x/black-low-poly-geometric-background-vector.jpg);
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      background-color: black;
      padding: 20px;
      text-align: center;
      color: whitesmoke;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .back_link {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background-color: rgba(255, 0, 0, 0.521);
      color: white;
      border: 2px solid black;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .back_link:hover {
      background-color: rgba(255, 0, 0, 0.742);
    }

    button:hover {
      background-color: #0056b3;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Add Student</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <label for="studentName">Full Name</label>
      <input type="text" id="studentName" name="studentName" required>

      <label for="rollNumber">Roll Number</label>
      <input type="text" id="rollNumber" name="rollNumber" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="course">Course</label>
      <input type="text" id="course" name="course" required>

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone">

      <label for="gender">Gender</label>
      <select id="gender" name="gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <label for="Address">Address</label>
      <input type="text" id="ADD" name="address" required>
      <label for="tfee">Total Fee</label>
      <input type="number" id="tf" name="tfee" required oninput="fees()">
      <label for="pfee">Paid Fee</label>
      <input type="number" id="pf" name="pfee" required oninput="fees()">
      <label for="lfee">Left Fee</label>
      <input type="number" id="lf" name="lfee" required>
      <label for="image">Upload Image</label>
      <input type="file" id="uploadimage" name="image" required>


      <button type="submit">Add Student</button>
    </form>
    <a href="{% url 'admin_dashboard'%}" class="back_link">Back To Dashboard</a><br><br>



    <div class="footer">
      &copy; 2025 Student Records App
    </div>
  </div>
  <script>
    function fees(argument) {
      let tf = document.getElementById('tf').value
      let pf = document.getElementById('pf').value
      lf.value = tf - pf

    }


  </script>
  {% if error == "no" %}
  <script>
    alert("Record Added Successfully")
    window.location = ("{% url 'view_stu' %}")
  </script>
  {% endif %}


  {% if error == "no" %}
  <script>
    alert("Something Went Wrong")
  </script>
  {% endif %}

</body>

</html>
