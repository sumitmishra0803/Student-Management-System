<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: url(https://static.vecteezy.com/system/resources/previews/001/225/154/non_2x/black-low-poly-geometric-background-vector.jpg);
      background-size: cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #000;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #aaa;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Change Password</h2>
    <form method="POST" return onsubmit="check_pass()" action=" /change_pass">
      {% csrf_token %}
      <label for="current">Current Password</label>
      <input type="password" id="current" name="current">

      <label for="new">New Password</label>
      <input type="password" id="new" name="new" required>

      <label for="confirm">Confirm New Password</label>
      <input type="password" id="confirm" name="confirm" required>

      <button type="submit">Update Password</button>
    </form>
    <script>
      function check_pass() {
        let np = document.getElementById('new').value
        let cp = document.getElementById('confirm').value
        if (np != cp) {
          alert("Password Not Matching")
        }
      }
    </script>
  </div>
</body>

</html>
